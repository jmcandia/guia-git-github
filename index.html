<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Git & GitHub — Guía Completa · DUOC UC</title>

  <!-- Prevenir flash de tema incorrecto -->
  <script>
    (function () {
      const saved = localStorage.getItem('guia-git-theme')
      const system = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
      document.documentElement.setAttribute('data-theme', saved || system)
    })()
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="app"></div>
  <script>
    // Recupera la ruta guardada y la restaura con pushState
    const redirect = sessionStorage.getItem('redirect')
    if (redirect) {
      sessionStorage.removeItem('redirect')
      history.replaceState(null, '', redirect)
    }
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
